#database
spring.datasource.url=jdbc:mysql://localhost:3306/testDB?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234


# JPA
spring.jpa.hibernate.ddl-auto=update

# ---- OAuth2 (Google, Apple) ----

# Google
spring.security.oauth2.client.registration.google.client-id=${BURNTZ_DEV_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${BURNTZ_DEV_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# --- Apple OAuth2 registration (Spring Security) ---
# --- Spring OAuth2 ?? (client_secret? ???? ?? ??) ---
spring.security.oauth2.client.registration.apple.client-id=${BURNTZ_APPLE_CLIENT_ID}
spring.security.oauth2.client.registration.apple.client-secret=
spring.security.oauth2.client.registration.apple.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.apple.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.apple.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.apple.scope=openid,email

spring.security.oauth2.client.provider.apple.authorization-uri=https://appleid.apple.com/auth/authorize
spring.security.oauth2.client.provider.apple.token-uri=https://appleid.apple.com/auth/token
spring.security.oauth2.client.provider.apple.jwk-set-uri=${BURNTZ_APPLE_JWKS_URL}

# --- Apple specific (????? ?? ??) ---
apple.team-id=${BURNTZ_APPLE_TEAM_ID}
apple.key-id=${BURNTZ_APPLE_KEY_ID}

# private key: ??/????? ?? ??(??) ?? APPLE_PRIVATE_KEY_B64(??? ???)? ???? ??
apple.private-key-path=${BURNTZ_APPLE_PRIVATE_KEY_FILE}

# --- ?? ??/?? (?? ?) ---
apple.jwks.url=${BURNTZ_APPLE_JWKS_URL}
apple.token.issuer=${BURNTZ_APPLE_TOKEN_ISSUER}
apple.token.audience=${BURNTZ_APPLE_CLIENT_ID}
apple.token.enforce-nonce=${APPLE_ENFORCE_NONCE}
apple.token.allowed-clock-skew-seconds=${BURNTZ_APPLE_CLOCK_SKEW}
apple.jwks.cache-ttl-seconds=${BURNTZ_APPLE_JWKS_TTL}
