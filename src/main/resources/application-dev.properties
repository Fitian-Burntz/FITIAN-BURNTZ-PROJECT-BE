# ---- OAuth2 (Google, Apple) ----

# Google
spring.security.oauth2.client.registration.google.client-id=${BURNTZ_DEV_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${BURNTZ_DEV_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Apple OAuth2 (replace placeholders)
spring.security.oauth2.client.registration.apple.client-id=109126080487812200825
#spring.security.oauth2.client.registration.apple.client-secret=
spring.security.oauth2.client.registration.apple.client-authentication-method=client_secret_post
