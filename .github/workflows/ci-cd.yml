name: CI/CD → ECR → ECS (develop)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["develop"]

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: 209479269102
  ECR_REPOSITORY: 209479269102.dkr.ecr.ap-northeast-2.amazonaws.com/burntz
  CLUSTER_NAME: burntz-cluster
  SERVICE_NAME: burntz-service
  TASK_DEF_PATH: aws/taskdef.json
  CONTAINER_NAME: burntz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      # ------------------------------
      #  JAR 빌드 및 검사 단계 추가
      #  - bootJar 실행해서 JAR 생성
      #  - JAR 내부에 mustache 템플릿 포함 여부 검사
      #  - 포함 시 artifact 업로드, 미포함 시 실패 (배포 차단)
      # ------------------------------
      - name: Build JAR (bootJar)
        run: |
          echo ">>> Running bootJar"
          chmod +x gradlew || true
          ./gradlew bootJar -x test
          echo ">>> Build finished. JARs in build/libs:"
          ls -lah build/libs

      - name: Inspect built JAR for admin-login.mustache
        run: |
          JAR=$(ls build/libs/*.jar | head -n1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No jar found under build/libs" >&2
            ls -la build/libs || true
            exit 1
          fi
          echo "Inspecting jar: $JAR"
          "$JAVA_HOME/bin/jar" tf "$JAR" | grep -E "BOOT-INF/classes/templates/.*/admin-login.mustache" || true
          # 실제 존재여부 체크
          if "$JAVA_HOME/bin/jar" tf "$JAR" | grep -q "BOOT-INF/classes/templates/admin/admin-login.mustache"; then
            echo "FOUND: admin-login.mustache inside $JAR"
          else
            echo "ERROR: admin-login.mustache NOT FOUND inside $JAR. Aborting deploy." >&2
            echo "You can comment out exit 1 to allow deploy anyway (not recommended)."
            # 배포 차단을 원치 않으면 다음 줄을 주석 처리하세요.
            exit 1
          fi

      - name: Upload built JAR as artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: build/libs/*.jar

      - name: Print OIDC info (debug)
        run: |
          echo "EVENT: $GITHUB_EVENT_NAME"
          echo "REF: $GITHUB_REF"
          echo "REPO: $GITHUB_REPOSITORY"
          echo "SHA: $GITHUB_SHA"
          echo "EVENT PATH: $GITHUB_EVENT_PATH"
          echo "---- event payload (first 200 lines) ----"
          sed -n '1,200p' "$GITHUB_EVENT_PATH" || true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::209479269102:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Ensure ECR repo exists (debug)
        run: aws ecr describe-repositories --repository-names burntz --region ${{ env.AWS_REGION }} || echo "ECR repo not found"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (buildx)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest

      - name: Install jq (for rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: "Debug: show taskdef and container names"
        run: |
          echo "TASK_DEF_PATH=${{ env.TASK_DEF_PATH }}"
          echo "CONTAINER_NAME=${{ env.CONTAINER_NAME }}"
          echo "---- task definition (preview) ----"
          sed -n '1,200p' "${{ env.TASK_DEF_PATH }}" || true
          echo "---- container names in taskdef ----"
          jq -r '.containerDefinitions[].name' "${{ env.TASK_DEF_PATH }}" || true
      

      - name: Render task definition (create rendered-taskdef.json)
        run: |
          IMG="${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "Rendering image -> $IMG"
          jq --arg img "$IMG" --arg cname "${{ env.CONTAINER_NAME }}" \
            '( .containerDefinitions |= map( if .name == $cname then .image = $img else . end ) )' \
            "${{ env.TASK_DEF_PATH }}" > rendered-taskdef.json
          echo "Rendered file size/preview:"
          ls -la rendered-taskdef.json || true
          sed -n '1,200p' rendered-taskdef.json || true

      - name: Check rendered file exists
        run: |
          if [ ! -f rendered-taskdef.json ]; then
            echo "ERROR: rendered-taskdef.json missing" >&2
            ls -la
            exit 1
          fi

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: rendered-taskdef.json
          service: ${{ env.SERVICE_NAME }}
          cluster: ${{ env.CLUSTER_NAME }}
