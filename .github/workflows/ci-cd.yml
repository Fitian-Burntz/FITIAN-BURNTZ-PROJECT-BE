name: CI/CD → ECR → ECS (develop)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["develop"]

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: 209479269102
  ECR_REPOSITORY: 209479269102.dkr.ecr.ap-northeast-2.amazonaws.com/burntz
  CLUSTER_NAME: burntz-cluster
  SERVICE_NAME: burntz-service
  TASK_DEF_PATH: aws/taskdef.json
  CONTAINER_NAME: burntz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Print OIDC info (debug)
        run: |
          echo "EVENT: $GITHUB_EVENT_NAME"
          echo "REF: $GITHUB_REF"
          echo "REPO: $GITHUB_REPOSITORY"
          echo "SHA: $GITHUB_SHA"
          echo "EVENT PATH: $GITHUB_EVENT_PATH"
          echo "---- event payload (first 200 lines) ----"
          sed -n '1,200p' "$GITHUB_EVENT_PATH" || true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::209479269102:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Ensure ECR repo exists (debug)
        run: aws ecr describe-repositories --repository-names burntz || echo "ECR repo not found"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest

      - name: Render ECS task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEF_PATH }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: rendered-taskdef.json
          service: ${{ env.SERVICE_NAME }}
          cluster: ${{ env.CLUSTER_NAME }}
