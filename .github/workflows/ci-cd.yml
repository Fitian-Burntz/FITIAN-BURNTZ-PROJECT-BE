name: CI/CD → ECR → ECS (develop)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["develop"]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/burntz
  CLUSTER_NAME: burntz-cluster
  SERVICE_NAME: burntz-service
  TASK_DEF_PATH: aws/taskdef.json
  CONTAINER_NAME: burntz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Print OIDC info (debug)
        run: |
          echo "EVENT: $GITHUB_EVENT_NAME"
          echo "REF: $GITHUB_REF"
          echo "REPO: $GITHUB_REPOSITORY"
          echo "SHA: $GITHUB_SHA"
          echo "EVENT PATH: $GITHUB_EVENT_PATH"
          echo "---- event payload (first 200 lines) ----"
          sed -n '1,200p' "$GITHUB_EVENT_PATH" || true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Ensure ECR repo exists (debug)
        run: aws ecr describe-repositories --repository-names burntz --region ${{ env.AWS_REGION }} || echo "ECR repo not found"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (buildx)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest

      - name: Install jq (for rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Render placeholders (${AWS_*}) into base taskdef
        run: |
          # envsubst 설치
          sudo apt-get update && sudo apt-get install -y gettext-base
          # ${AWS_ACCOUNT_ID}, ${AWS_REGION} 등 치환
          envsubst < "${{ env.TASK_DEF_PATH }}" > rendered-taskdef.base.json

          echo "---- rendered-taskdef.base.json (head) ----"
          sed -n '1,120p' rendered-taskdef.base.json || true

          echo "---- sanity: unresolved placeholders? ----"
          if grep -R "\${" rendered-taskdef.base.json; then
            echo "ERROR: unresolved placeholders remain in rendered-taskdef.base.json" >&2
            exit 1
          fi          

      - name: "Debug: show taskdef and container names"
        run: |
          echo "TASK_DEF_PATH=${{ env.TASK_DEF_PATH }}"
          echo "CONTAINER_NAME=${{ env.CONTAINER_NAME }}"
          echo "---- task definition (preview) ----"
          sed -n '1,200p' "${{ env.TASK_DEF_PATH }}" || true
          echo "---- container names in taskdef ----"
          jq -r '.containerDefinitions[].name' rendered-taskdef.base.json || true
      

      - name: Render task definition (create rendered-taskdef.json)
        run: |
          IMG="${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "Rendering image -> $IMG"
          jq --arg img "$IMG" --arg cname "${{ env.CONTAINER_NAME }}" \
            '( .containerDefinitions |= map( if .name == $cname then .image = $img else . end ) )' \
            rendered-taskdef.base.json > rendered-taskdef.json
          echo "Rendered file size/preview:"
          ls -la rendered-taskdef.json || true
          sed -n '1,200p' rendered-taskdef.json || true

      - name: Check rendered file exists
        run: |
          if [ ! -f rendered-taskdef.json ]; then
            echo "ERROR: rendered-taskdef.json missing" >&2
            ls -la
            exit 1
          fi

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: rendered-taskdef.json
          service: ${{ env.SERVICE_NAME }}
          cluster: ${{ env.CLUSTER_NAME }}

      - name:  Configure ECS AutoScaling (min=2, max=4, CPU=60%)
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
        run: |
          set -euo pipefail
          RESOURCE_ID="service/${CLUSTER_NAME}/${SERVICE_NAME}"
            
          echo "▶ Register scalable target (min=2, max=4)"
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id "${RESOURCE_ID}" \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity 2 \
            --max-capacity 4 \
            --region "${AWS_REGION}"
            
          echo "▶ Put TargetTracking policy: CPU 60%"
          aws application-autoscaling put-scaling-policy \
            --service-namespace ecs \
            --resource-id "${RESOURCE_ID}" \
            --scalable-dimension ecs:service:DesiredCount \
            --policy-name "cpu60-target-tracking" \
            --policy-type TargetTrackingScaling \
            --target-tracking-scaling-policy-configuration '{
              "TargetValue": 60.0,
              "PredefinedMetricSpecification": { "PredefinedMetricType": "ECSServiceAverageCPUUtilization" },
              "ScaleOutCooldown": 60,
              "ScaleInCooldown": 120
            }' \
            --region "${AWS_REGION}"
            
          echo "▶ Current scaling policies"
          aws application-autoscaling describe-scaling-policies \
            --service-namespace ecs \
            --resource-id "${RESOURCE_ID}" \
            --region "${AWS_REGION}" \
            --query "ScalingPolicies[].{Name:PolicyName,Type:PolicyType,Target:TargetTrackingScalingPolicyConfiguration.TargetValue}" \
            --output table